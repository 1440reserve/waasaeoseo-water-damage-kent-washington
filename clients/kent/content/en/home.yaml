process:
  eyebrow: "How it works"
  title: "What happens when you call"
  steps:
    - title: "Tell us what happened"
      description: "You describe the situation: where the water is coming from, how long it has been sitting, and what kind of water you are dealing with. If fire or smoke damage is part of the loss, say so, and the right crew gets dispatched for the job."
    - title: "Inspection and assessment"
      description: "Technicians inspect the property, trace the water leak back to its source, and use moisture meters to map how far water has traveled into floors, walls, and contents. You get a written scope before work starts."
    - title: "Water extraction and removal"
      description: "Truck-mounted pumps and extraction equipment pull out standing water fast, before porous materials like hardwood, carpet pad, and drywall are ruined beyond saving."
    - title: "Structural drying and monitoring"
      description: "Commercial dehumidifiers and air movers run until the meters prove the structure is dry, with readings logged daily. Clear communication along the way means you always know the condition of your home."
    - title: "Repairs, cleanup, and your claim"
      description: "The crew handles cleaning, mold removal where it is needed, and repairs, and the drying logs and photos go straight to your insurance company so the claim keeps moving."

localIntro:
  eyebrow: "Local knowledge"
  title: "Water damage help built for Kent"
  paragraphs:
    - "Kent sits in the Green River valley just south of Seattle, and the geography shows up in flooded homes every winter. Atmospheric river storms saturate the ground and push water into crawl spaces, wind leaves roof leaks and storm damage behind, and a hard cold snap bursts pipes from East Hill to the West Hill. Sewage backups and appliance leaks do not care what season it is."
    - "Not every water loss is the same job. Clean water from a burst supply line is a different problem than gray water from a washing machine, and both are a world away from black water out of a sewage backup. The cleanup techniques, safety gear, drying time, and what insurance companies will cover all change with the category, and our guides explain each type in plain English."
    - "Choosing a water damage restoration company mid-emergency is hard, so we did the vetting ahead of time. The mitigation and restoration services behind this site come from licensed, insured professionals working the Kent area, with real Google reviews you can check before the truck arrives. Customers get straight answers, a written estimate, and a crew that treats the house like they live in it."
    - "The service area covers Kent and the neighboring communities of Covington, Des Moines, SeaTac, Tukwila, Fairwood, and Maple Valley. Outside that? Call anyway. Emergency service routing exists so nobody is left watching the water rise."
